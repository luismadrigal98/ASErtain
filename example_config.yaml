# ASErtain cross-design configuration (template)
#
# Models a two-lineage / F1 design with OUTBRED parents and NESTED replication.
# ASErtain works in terms of generic roles, so any organism fits:
#
#   variable lineage : the parental lineage carrying the expression difference of
#                      interest, often with several cross parents
#   fixed lineage    : the other parental lineage
#   background       : an F1 grouping, by default its mother (variable-lineage
#                      parent), used for the cross-background consistency check
#
# Key ideas this schema encodes:
#   * Each F1 PLANT names its exact mother and father, so informative SNPs are
#     phased per individual (works even when parents are heterozygous/outbred).
#   * FLOWERS (RNA samples) are nested under their plant. The plant is the
#     biological replicate; flowers are technical/observational sub-samples.
#   * F1 plants are genotyped (vcf_sample) so the "one parent heterozygous" case
#     can be phased.

project: my_ase_study

variable_label: speciesA          # display name for the variable lineage
fixed_label: speciesB             # display name for the fixed lineage

reference:
  fasta: /path/to/reference.fa
  # which entity the reference equals — drives bias bookkeeping.
  # one of: variable | fixed | third_species | a parent name | unknown
  # NB: if the reference IS one parent, prefer --bias-mode nmask or wasp
  # (see `asertain mask-reference`) because the other allele can be lost.
  identity: variable

# All parent individuals (may be heterozygous — outbred is fine).
parents:
  - { name: p1, vcf_sample: SPA_parent1, lineage: variable }
  - { name: p2, vcf_sample: SPA_parent2, lineage: variable }
  - { name: q1, vcf_sample: SPB_parent1, lineage: fixed }

# F1 plants = biological replicates. Each names its mother (variable lineage),
# father (fixed lineage), its own VCF column, and its flowers (RNA samples).
f1_plants:
  - name: plant_p1_A
    mother: p1
    father: q1
    vcf_sample: F1_p1A
    flowers:
      - { name: p1A_flower1, bam: /path/bams/p1A_flower1.bam }
      - { name: p1A_flower2, bam: /path/bams/p1A_flower2.bam }
  - name: plant_p1_B
    mother: p1
    father: q1
    vcf_sample: F1_p1B
    flowers:
      - { name: p1B_flower1, bam: /path/bams/p1B_flower1.bam }
      - { name: p1B_flower2, bam: /path/bams/p1B_flower2.bam }
  - name: plant_p2_A
    mother: p2
    father: q1
    vcf_sample: F1_p2A
    flowers:
      - { name: p2A_flower1, bam: /path/bams/p2A_flower1.bam }
      - { name: p2A_flower2, bam: /path/bams/p2A_flower2.bam }
  - name: plant_p2_B
    mother: p2
    father: q1
    vcf_sample: F1_p2B
    flowers:
      - { name: p2B_flower1, bam: /path/bams/p2B_flower1.bam }
      - { name: p2B_flower2, bam: /path/bams/p2B_flower2.bam }

# Optional gene annotation for assigning SNPs to genes (GTF or GFF3, may be .gz).
gtf: /path/to/annotation.gff3
annotation_window: 500
